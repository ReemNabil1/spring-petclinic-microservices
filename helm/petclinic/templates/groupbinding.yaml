apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: petclinic-developers
  namespace: {{ .Values.namespace }}

subjects:
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: Role
  name: petclinic-role
  apiGroup: rbac.authorization.k8s.io