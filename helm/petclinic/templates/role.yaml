apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: petclinic-role
  namespace: {{ .Values.namespace }}

rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]